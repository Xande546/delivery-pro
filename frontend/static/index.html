<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ea1d2c" />
  <title>Delivery Lanchonete Pro</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="client-page">
  <header class="topbar glass">
    <div>
      <span class="eyebrow">Delivery</span>
      <h1>Lanchonete Pro</h1>
    </div>
    <button class="cart-pill" id="openCartBtn">🛒 <span id="cartCount">0</span></button>
  </header>

  <main class="app-shell">
    <section class="hero-card">
      <div>
        <span class="badge">Aberto agora</span>
        <h2>Seu pedido quentinho, rápido e sem complicação.</h2>
        <p>Escolha seus lanches, acompanhe o carrinho e finalize em poucos toques.</p>
      </div>
    </section>

    <section class="search-card">
      <input id="searchInput" type="search" placeholder="Buscar produto, combo, bebida..." autocomplete="off" />
    </section>

    <nav class="category-scroll" id="categoryList"></nav>

    <section class="section-head">
      <div>
        <span class="eyebrow">Cardápio</span>
        <h2>Produtos</h2>
      </div>
      <span id="productCounter" class="muted"></span>
    </section>

    <section class="product-grid" id="productGrid"></section>
  </main>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-panel">
      <div class="cart-header">
        <h2>Meu carrinho</h2>
        <button class="icon-btn" id="closeCartBtn">✕</button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="checkout-box">
        <div class="total-row"><span>Total</span><strong id="cartTotal">R$ 0,00</strong></div>
        <input id="customerName" placeholder="Seu nome" />
        <input id="customerPhone" placeholder="Telefone / WhatsApp" />
        <input id="customerAddress" placeholder="Endereço ou Retirada no balcão" />
        <select id="paymentMethod">
          <option value="Pix">Pix</option>
          <option value="Cartão">Cartão</option>
          <option value="Dinheiro">Dinheiro</option>
        </select>
        <textarea id="orderNotes" placeholder="Observações do pedido"></textarea>
        <button class="primary-btn" id="finishOrderBtn">Finalizar pedido</button>
      </div>
    </div>
  </aside>

  <div class="toast" id="toast"></div>
  <script src="scripts.js"></script>
</body>
</html>
