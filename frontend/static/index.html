<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delivery Lanchonete Pro</title>
    <!-- Meta tags to prepare for PWA -->
    <meta name="theme-color" content="#ff4d4f" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header with brand and search -->
    <header class="header">
      <div class="container header-content">
        <h1 class="brand">Delivery Lanchonete Pro</h1>
        <div class="search-bar">
          <input
            type="text"
            id="search-input"
            placeholder="Buscar produtos..."
            aria-label="Buscar produtos"
          />
        </div>
        <button id="cart-toggle" class="cart-btn" aria-label="Carrinho">
          🛒 <span id="cart-count">0</span>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main>
      <!-- Banner section -->
      <section class="banner" id="banner-section">
        <div class="banner-text">
          <h2>Bem-vindo(a)!</h2>
          <p>Peça seu lanche favorito rapidamente.</p>
        </div>
      </section>

      <!-- Categories -->
      <section class="categories" id="categories-section">
        <h2>Categorias</h2>
        <div class="categories-container" id="categories-container">
          <!-- Categories dynamically loaded here -->
        </div>
      </section>

      <!-- Products -->
      <section class="products" id="products-section">
        <h2>Produtos</h2>
        <div class="products-container" id="products-container">
          <!-- Product cards dynamically loaded here -->
        </div>
      </section>
    </main>

    <!-- Cart side panel -->
    <aside id="cart-panel" class="cart-panel hidden" aria-hidden="true">
      <div class="cart-header">
        <h2>Seu Carrinho</h2>
        <button id="close-cart" class="close-btn" aria-label="Fechar carrinho">&times;</button>
      </div>
      <div id="cart-items" class="cart-items">
        <!-- Cart items inserted here -->
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          Total: <span id="cart-total">R$ 0,00</span>
        </div>
        <button id="checkout-btn" class="checkout-btn">Finalizar Pedido</button>
      </div>
    </aside>

    <!-- Checkout modal -->
    <div id="checkout-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-content">
        <button id="close-modal" class="close-btn" aria-label="Fechar">&times;</button>
        <h2>Finalizar Pedido</h2>
        <form id="checkout-form">
          <div class="form-group">
            <label for="customer-name">Nome</label>
            <input
              type="text"
              id="customer-name"
              name="customer-name"
              required
              placeholder="Seu nome"
            />
          </div>
          <div class="form-group">
            <label for="customer-phone">Telefone</label>
            <input
              type="tel"
              id="customer-phone"
              name="customer-phone"
              required
              placeholder="(99) 99999-9999"
            />
          </div>
          <div class="form-group">
            <label>Opção de entrega</label>
            <div class="delivery-options">
              <label>
                <input
                  type="radio"
                  name="delivery-option"
                  value="retirada"
                  checked
                />
                Retirada
              </label>
              <label>
                <input type="radio" name="delivery-option" value="entrega" />
                Entrega
              </label>
            </div>
          </div>
          <div class="form-group hidden" id="address-group">
            <label for="customer-address">Endereço</label>
            <textarea
              id="customer-address"
              name="customer-address"
              placeholder="Rua, número, bairro, cidade"
              rows="2"
            ></textarea>
          </div>
          <div class="form-group">
            <label for="payment-method">Forma de pagamento</label>
            <select id="payment-method" name="payment-method">
              <option value="dinheiro">Dinheiro</option>
              <option value="cartao">Cartão</option>
              <option value="pix">Pix</option>
            </select>
          </div>
          <button type="submit" class="submit-order-btn">Enviar Pedido</button>
        </form>
      </div>
    </div>

    <!-- Overlay for modals and cart panel -->
    <div id="overlay" class="overlay hidden" aria-hidden="true"></div>

    <script src="scripts.js"></script>
  </body>
</html>
