<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Produtos • Delivery Pro</title><link rel="stylesheet" href="styles.css"/></head>
<body class="admin-page">
  <aside class="sidebar"><h1>Delivery Pro</h1><a href="admin.html">Dashboard</a><a class="active" href="products_admin.html">Produtos</a><a href="report.html">Relatórios</a><a href="index.html">Ver loja</a></aside>
  <main class="admin-main">
    <section class="admin-header"><div><span class="eyebrow">Cadastro premium</span><h2>Produtos</h2></div></section>
    <section class="admin-card">
      <form id="productForm" class="product-form">
        <input name="name" placeholder="Nome do produto" required />
        <input name="price" type="number" step="0.01" placeholder="Preço" required />
        <input name="category" placeholder="Categoria" />
        <input name="image_url" placeholder="URL da imagem ou caminho /static/uploads/..." />
        <textarea name="description" placeholder="Descrição"></textarea>
        <label class="file-label">Upload de imagem <input name="image" type="file" accept="image/*" /></label>
        <button class="primary-btn" type="submit">Salvar produto</button>
      </form>
    </section>
    <section class="product-grid admin-products" id="adminProducts"></section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="scripts.js"></script>
</body></html>
