<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Produtos | Delivery Pro</title><link rel="stylesheet" href="styles.css"></head><body class="admin-page"><aside class="side"><h1>Delivery Pro</h1><a href="admin.html">Dashboard</a><a class="active" href="products_admin.html">Produtos</a><a href="report.html">Relatórios</a><a href="index.html">Ver loja</a></aside><main class="admin"><section class="admin-top"><div><span class="mini">cadastro inteligente</span><h2>Produtos e categorias</h2><p>Cadastro fácil, busca rápida e edição visual.</p></div></section><section class="product-admin-layout"><form id="productForm" class="form-card"><input type="hidden" name="id"><label>Nome<input name="name" required placeholder="X-Burger artesanal"></label><label>Preço<input name="price" required type="number" step="0.01" placeholder="24.90"></label><label>Categoria<input name="category" placeholder="Lanches"></label><label>URL da imagem<input name="image_url" placeholder="https://... ou /static/uploads/... "></label><label>Descrição<textarea name="description" placeholder="Pão brioche, blend 160g, queijo..."></textarea></label><label class="switch"><input name="active" type="checkbox" checked> Produto ativo no cardápio</label><label class="upload">Upload de imagem<input name="image" type="file" accept="image/*"></label><div class="form-actions"><button class="btn primary" type="submit">Salvar produto</button><button class="btn" type="button" id="newProductBtn">Novo</button></div></form><section class="table-card"><div class="toolbar"><input id="adminProductSearch" placeholder="Buscar produto"><select id="adminCategoryFilter"><option value="">Todas categorias</option></select></div><div class="product-table" id="adminProducts"></div></section></section></main><div class="toast" id="toast"></div><script src="scripts.js"></script></body></html>
