<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Delivery Lanchonete Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #252525, #050505);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #333;
      border-radius: 22px;
      padding: 35px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.6);
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 {
      margin: 0;
      font-size: 26px;
    }

    .logo p {
      color: #aaa;
      margin-top: 8px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #ddd;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border-radius: 12px;
      border: 1px solid #333;
      background: #111;
      color: white;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #ff7a00;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #ff7a00, #ff3d00);
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .error {
      margin-top: 15px;
      color: #ff6b6b;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">
      <h1>🍔 Delivery Pro</h1>
      <p>Acesso ao painel da lanchonete</p>
    </div>

    <label>Usuário</label>
    <input id="username" type="text" placeholder="Digite o usuário">

    <label>Senha</label>
    <input id="password" type="password" placeholder="Digite a senha">

    <button onclick="login()">Entrar no painel</button>

    <div id="error" class="error">Usuário ou senha inválidos</div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const response = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        window.location.href = '/admin';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>

</body>
</html>
