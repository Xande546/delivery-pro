<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin • Delivery Pro</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">
  <aside class="sidebar">
    <h1>Delivery Pro</h1>
    <a class="active" href="admin.html">Dashboard</a>
    <a href="products_admin.html">Produtos</a>
    <a href="report.html">Relatórios</a>
    <a href="index.html">Ver loja</a>
  </aside>
  <main class="admin-main">

      <div><span class="eyebrow">Painel executivo</span><h2>Pedidos em tempo real</h2></div>
      <button class="primary-btn small" id="refreshAdminBtn">Atualizar</button>

    <section class="kpi-grid">

      <div class="kpi"><span>Pendentes</span><strong id="kpiPending">0</strong></div>
      <div class="kpi"><span>Ticket médio</span><strong id="kpiAvg">R$ 0,00</strong></div>
    </section>
    <section class="kanban" id="kanbanBoard"></section>
  </main>
  <div class="toast" id="toast"></div>
  <script src="scripts.js"></script>
