<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios - Delivery Pro</title>

<style>
:root{
--bg:#070b12;--panel:#101722;--border:#223049;--text:#f8fafc;--muted:#94a3b8;
--orange:#ff7a00;--orange2:#ff3d00;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;
--yellow:#fbbf24;--purple:#8b5cf6;--shadow:0 24px 70px rgba(0,0,0,.35)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#070b12,#0b1220);color:var(--text);min-height:100vh}
.topbar{height:88px;border-bottom:1px solid var(--border);background:rgba(7,11,18,.92);display:flex;align-items:center;justify-content:space-between;padding:0 30px;position:sticky;top:0;backdrop-filter:blur(14px);z-index:10}
.brand{display:flex;align-items:center;gap:14px}
.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--orange),var(--orange2));display:grid;place-items:center;font-size:25px;box-shadow:0 15px 35px rgba(255,90,0,.3)}
.brand h1{font-size:25px}.brand p{font-size:13px;color:var(--muted);margin-top:4px}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:12px 18px;border-radius:14px;border:1px solid #30415f;background:#132038;color:#fff;font-weight:800;text-decoration:none;cursor:pointer}
.btn.primary{background:linear-gradient(135deg,var(--orange),var(--orange2));border:none}
.wrap{max-width:1400px;margin:auto;padding:28px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-bottom:24px}
.card{background:rgba(16,23,34,.96);border:1px solid var(--border);border-radius:24px;padding:24px;box-shadow:var(--shadow)}
.card span{display:block;color:var(--muted);margin-bottom:12px;font-weight:700}.card strong{font-size:34px}
.section{background:rgba(16,23,34,.96);border:1px solid var(--border);border-radius:26px;overflow:hidden;box-shadow:var(--shadow)}
.section-head{padding:22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.section-head h2{font-size:25px;margin-bottom:7px}.section-head p{color:var(--muted);font-size:13px}
.filters{display:flex;gap:10px;flex-wrap:wrap}
select,input{background:#0b1220;border:1px solid #263651;color:#fff;border-radius:14px;padding:12px 14px;outline:none}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:17px 16px;text-align:left;border-bottom:1px solid #1c2940;white-space:nowrap}
th{background:#0b1220;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#9fb3d9}
tr:hover{background:rgba(255,255,255,.03)}
.badge{padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;display:inline-block}
.finalizado{background:rgba(34,197,94,.15);color:#86efac}.cancelado{background:rgba(239,68,68,.15);color:#fecaca}.novo{background:rgba(59,130,246,.15);color:#bfdbfe}.em_preparo{background:rgba(255,176,32,.15);color:#fed7aa}.saiu_entrega{background:rgba(139,92,246,.15);color:#ddd6fe}
.total{color:var(--yellow);font-weight:900}.empty{padding:34px;text-align:center;color:var(--muted)}
@media(max-width:900px){.topbar{padding:16px;height:auto;align-items:flex-start;gap:12px;flex-direction:column}.wrap{padding:16px}}
</style>
</head>

<body>
<header class="topbar">
  <div class="brand">
    <div class="logo">📊</div>
    <div>
      <h1>Relatórios</h1>
      <p>Vendas, pedidos e histórico em tempo real</p>
    </div>
  </div>

  <div class="actions">
    <button class="btn" onclick="loadOrders()">🔄 Atualizar</button>
    <a href="/admin" class="btn primary">← Voltar ao painel</a>
  </div>
</header>

<div class="wrap">
  <div class="cards">
    <div class="card"><span>Total de pedidos</span><strong id="total-orders">0</strong></div>
    <div class="card"><span>Faturamento válido</span><strong id="total-revenue">R$ 0,00</strong></div>
    <div class="card"><span>Finalizados</span><strong id="completed-orders">0</strong></div>
    <div class="card"><span>Ativos agora</span><strong id="active-orders">0</strong></div>
  </div>

  <section class="section">
    <div class="section-head">
      <div>
        <h2>📦 Histórico de Pedidos</h2>
        <p>Mostrando todos os pedidos recebidos no sistema</p>
      </div>

      <div class="filters">
        <select id="status-filter" onchange="renderOrders()">
          <option value="todos">Todos os status</option>
          <option value="novo">Novo</option>
          <option value="em_preparo">Em preparo</option>
          <option value="saiu_entrega">Saiu para entrega</option>
          <option value="finalizado">Finalizado</option>
          <option value="cancelado">Cancelado</option>
        </select>

        <input id="search-filter" placeholder="Buscar cliente..." oninput="renderOrders()">
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Pedido</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Pagamento</th>
            <th>Data/Hora</th>
            <th>Total</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="orders-body"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
let allOrdersCache = [];

function money(value){
  return Number(value || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function label(status){
  const labels = {
    novo:'Novo',
    em_preparo:'Em preparo',
    saiu_entrega:'Saiu para entrega',
    finalizado:'Finalizado',
    cancelado:'Cancelado'
  };
  return labels[status] || status;
}

function safe(value){
  return String(value ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function formatDate(value){
  if(!value) return '-';

  const d = new Date(value);

  if(!isNaN(d.getTime())){
    return d.toLocaleString('pt-BR');
  }

  return value;
}

async function loadOrders(){
  try{
    const resp = await fetch('/api/orders');

    if(resp.status === 401){
      window.location.href = '/admin';
      return;
    }

    allOrdersCache = await resp.json();

    updateCards();
    renderOrders();

  }catch(e){
    document.getElementById('orders-body').innerHTML = `
      <tr><td colspan="7" class="empty">Erro ao carregar pedidos.</td></tr>
    `;
  }
}

function updateCards(){
  const revenue = allOrdersCache
    .filter(o => o.status !== 'cancelado')
    .reduce((acc,o)=> acc + Number(o.total || 0), 0);

  const active = allOrdersCache
    .filter(o => ['novo','em_preparo','saiu_entrega'].includes(o.status))
    .length;

  document.getElementById('total-orders').textContent = allOrdersCache.length;
  document.getElementById('total-revenue').textContent = money(revenue);
  document.getElementById('completed-orders').textContent =
    allOrdersCache.filter(o=>o.status === 'finalizado').length;
  document.getElementById('active-orders').textContent = active;
}

function renderOrders(){
  const status = document.getElementById('status-filter').value;
  const search = document.getElementById('search-filter').value.toLowerCase().trim();

  let list = [...allOrdersCache];

  if(status !== 'todos'){
    list = list.filter(o => o.status === status);
  }

  if(search){
    list = list.filter(o =>
      String(o.customer_name || '').toLowerCase().includes(search) ||
      String(o.phone || '').toLowerCase().includes(search)
    );
  }

  const body = document.getElementById('orders-body');

  if(!list.length){
    body.innerHTML = `
      <tr><td colspan="7" class="empty">Nenhum pedido encontrado.</td></tr>
    `;
    return;
  }

  body.innerHTML = list.map(order => `
    <tr>
      <td><strong>#${order.id}</strong></td>
      <td>${safe(order.customer_name)}</td>
      <td><span class="badge ${order.status}">${label(order.status)}</span></td>
      <td>${safe(order.payment_method)}</td>
      <td>${formatDate(order.created_at)}</td>
      <td class="total">${money(order.total)}</td>
      <td>
        <button class="btn" onclick="printOrder(${order.id})">🖨 Imprimir</button>
      </td>
    </tr>
  `).join('');
}

async function printOrder(orderId){
  const resp = await fetch(`/api/orders/${orderId}/print`, {method:'POST'});
  const data = await resp.json();
  alert(data.message || 'Pedido enviado para impressão.');
}

loadOrders();
setInterval(loadOrders,5000);
</script>
</body>
</html>
